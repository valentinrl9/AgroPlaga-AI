# Piloto 24/7 — VPS con HTTPS (Caddy + Let's Encrypt)
# Uso: docker compose -f docker-compose.pilot.yml --env-file deploy/pilot.env up -d --build

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - scan_images:/data/scans
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-invite_only}
      PILOT_SEED_INVITES: ${PILOT_SEED_INVITES:-true}
      MASTER_EMAIL: ${MASTER_EMAIL:-}
      MASTER_PASSWORD: ${MASTER_PASSWORD:-}
      MASTER_NAME: ${MASTER_NAME:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      SCAN_IMAGES_DIR: /data/scans
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-panel/dist:/srv/panel:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  postgres_data:
  scan_images:
  caddy_data:
  caddy_config:
